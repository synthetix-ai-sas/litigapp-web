<header class="bg-blue-800 text-white shadow-md sticky top-0 z-10 border-b-4 border-blue-600"
  style="padding-top: env(safe-area-inset-top, 0px)">
  <div class="max-w-7xl mx-auto h-16 flex items-center justify-between"
    style="padding-left: max(1rem, env(safe-area-inset-left)); padding-right: max(1rem, env(safe-area-inset-right))">
    <div class="flex items-center gap-2">
      <lucide-icon [img]="Scale" [size]="28" class="text-blue-300" />
      <h1 class="text-xl font-bold tracking-wide">LitigApp</h1>
    </div>
    <div class="flex items-center gap-4">
      <button
        (click)="bellClick.emit()"
        title="Ver novedades"
        class="relative p-1 -m-1 text-blue-100 hover:text-white transition-colors"
      >
        <lucide-icon [img]="Bell" [size]="20" />
        @if (noveltiesCount() > 0) {
          <span class="absolute -top-1.5 -right-1.5 bg-red-500 text-white text-[10px] rounded-full w-4 h-4 flex items-center justify-center font-bold ring-2 ring-blue-800">
            {{ noveltiesCount() }}
          </span>
        }
      </button>
      <button
        (click)="logout.emit()"
        title="Cerrar sesión"
        class="flex items-center gap-1.5 text-sm text-blue-100 hover:text-white transition-colors"
      >
        <lucide-icon [img]="LogOut" [size]="18" />
      </button>
      <div class="flex items-center gap-2 cursor-pointer hover:opacity-80 transition-opacity" (click)="logout.emit()">
        <div class="hidden md:block text-right">
          @if (userName()) {
            <p class="text-xs font-semibold leading-tight">{{ userName() }}</p>
          }
        </div>
        <div class="w-8 h-8 bg-blue-100 text-blue-800 rounded-full flex items-center justify-center font-bold border border-blue-300 shadow-sm text-sm">
          {{ userInitials() }}
        </div>
      </div>
    </div>
  </div>
</header>
