<app-main-layout [noveltiesCount]="noveltiesTotal()" (logout)="logout()">

  <app-import-banner [importJob]="importActive()?.importJob ?? null" />

  <main class="max-w-7xl mx-auto py-6"
    style="padding-left: max(1rem, env(safe-area-inset-left)); padding-right: max(1rem, env(safe-area-inset-right)); padding-bottom: max(1.5rem, env(safe-area-inset-bottom))">

    <!-- TABS NAV -->
    <div class="flex items-center justify-between border-b border-slate-200 mb-8">
      <div class="flex">
        <button (click)="setTab('novedades')"
          class="flex items-center gap-2 px-6 py-3 font-medium text-sm transition-colors relative"
          [class.text-blue-600]="activeTab() === 'novedades'"
          [class.text-slate-500]="activeTab() !== 'novedades'">
          <lucide-icon [img]="Bell" [size]="18" />
          Novedades
          @if (noveltiesTotal() > 0) {
            <span class="bg-red-100 text-red-600 py-0.5 px-2 rounded-full text-xs font-bold ml-1">{{ noveltiesTotal() }}</span>
          }
          @if (activeTab() === 'novedades') {
            <div class="absolute bottom-0 left-0 w-full h-0.5 bg-blue-600 rounded-t-md"></div>
          }
        </button>
        <button (click)="setTab('procesos')"
          class="flex items-center gap-2 px-6 py-3 font-medium text-sm transition-colors relative"
          [class.text-blue-600]="activeTab() === 'procesos'"
          [class.text-slate-500]="activeTab() !== 'procesos'">
          <lucide-icon [img]="FileText" [size]="18" />
          Procesos
          @if (activeTab() === 'procesos') {
            <div class="absolute bottom-0 left-0 w-full h-0.5 bg-blue-600 rounded-t-md"></div>
          }
        </button>
      </div>
      <button (click)="openAgregar()"
        [disabled]="importActive()?.hasActive"
        [title]="importActive()?.hasActive ? 'Hay una importación en curso. Espera a que termine.' : 'Agregar Proceso'"
        class="mb-1 bg-blue-600 hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed text-white px-3 py-2 rounded-lg font-medium flex items-center gap-2 transition-colors shadow-sm shrink-0">
        <lucide-icon [img]="Plus" [size]="18" />
        <span class="hidden sm:inline">Agregar Proceso</span>
      </button>
    </div>

    <!-- TAB CONTENT -->
    @if (activeTab() === 'novedades') {
      <app-novelties-tab
        [novelties]="novelties()"
        [loading]="noveltiesLoading()"
        (atender)="openAtender($event)" />
    }
    @if (activeTab() === 'procesos') {
      <app-processes-tab
        [procesos]="procesos()"
        [procesosLoading]="procesosLoading()"
        [procesosTotal]="procesosTotal()"
        [procesosPage]="procesosPage()"
        [procesosTotalPages]="procesosTotalPages()"
        [filterForm]="filterForm"
        [importActive]="importActive()"
        (openOpciones)="openOpciones($event)"
        (openAgregar)="openAgregar()"
        (goToPage)="goToPage($event)"
        (applyFilters)="applyFilters()" />
    }
  </main>

  <!-- MODALS -->
  @if (modalType() !== null) {
    <div class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center p-4 z-50">
      @if (modalType() === 'atender') {
        <app-atender-modal
          [process]="selected()"
          [loading]="detailLoading()"
          [actionPending]="actionPending()"
          (close)="closeModal()"
          (markAttended)="markAttended()" />
      }
      @if (modalType() === 'opciones') {
        <app-opciones-modal
          [process]="selected()"
          [loading]="detailLoading()"
          (close)="closeModal()"
          (downloadPdf)="downloadPdf()" />
      }
      @if (modalType() === 'agregar') {
        <app-agregar-modal
          [addForm]="addForm"
          [addError]="addError()"
          [actionPending]="actionPending()"
          (close)="closeModal()"
          (submitted)="submitAdd()"
          (wizardCreated)="onWizardCreated()"
          (importCompleted)="onImportCompleted()" />
      }
    </div>
  }

</app-main-layout>
