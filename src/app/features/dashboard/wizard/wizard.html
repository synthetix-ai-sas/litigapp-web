<div class="px-6 pt-5 pb-6 space-y-4">

  <!-- Error banner -->
  @if (error()) {
    <div class="flex items-start gap-2 bg-red-50 border border-red-200 text-red-700 rounded-lg px-3 py-2 text-sm">
      <lucide-icon [img]="TriangleAlert" [size]="16" class="mt-0.5 shrink-0" />
      {{ error() }}
    </div>
  }

  <!-- Departamento + Municipio -->
  <div class="grid grid-cols-2 gap-3">
    <div>
      <label class="block text-xs font-semibold text-slate-600 mb-1.5">Departamento</label>
      <select [value]="selectedDeptId()" (change)="onDeptChange($any($event.target).value)"
        class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none appearance-none"
        [disabled]="deptLoading()">
        <option value="">Seleccione...</option>
        @for (d of departments(); track d.id) {
          <option [value]="d.id">{{ d.name }}</option>
        }
      </select>
    </div>
    <div>
      <label class="block text-xs font-semibold text-slate-600 mb-1.5">Municipio</label>
      <select [value]="selectedCityId()" (change)="onCityChange($any($event.target).value)"
        class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none appearance-none disabled:opacity-50"
        [disabled]="!selectedDeptId() || cityLoading()">
        <option value="">Seleccione...</option>
        @for (c of cities(); track c.id) {
          <option [value]="c.id">{{ c.name }}</option>
        }
      </select>
    </div>
  </div>

  <!-- Tipo de Juzgado / Especialidad -->
  @if (specialties().length > 0) {
    <div>
      <label class="block text-xs font-semibold text-slate-600 mb-1.5">Tipo de Juzgado / Especialidad</label>
      <select [value]="selectedSpecialtyId()" (change)="onSpecialtyChange($any($event.target).value)"
        class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none appearance-none disabled:opacity-50"
        [disabled]="!selectedCityId() || courtLoading()">
        <option value="">Seleccione...</option>
        @for (s of specialties(); track s.id) {
          <option [value]="s.id">{{ s.name }}</option>
        }
      </select>
    </div>
  }

  <!-- Despacho + Últimos 10 dígitos -->
  <div class="grid grid-cols-2 gap-3">
    <div>
      <label class="block text-xs font-semibold text-slate-600 mb-1.5">Despacho</label>
      <select [value]="selectedCourtId()" (change)="selectedCourtId.set($any($event.target).value)"
        class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none appearance-none disabled:opacity-50"
        [disabled]="!selectedCityId() || courtLoading()">
        <option value="">Número...</option>
        @for (ct of courts(); track ct.id) {
          <option [value]="ct.id">{{ ct.name }}</option>
        }
      </select>
    </div>
    <div>
      <label class="block text-xs font-semibold text-slate-600 mb-1.5">Últimos 10 dígitos</label>
      <input type="text" [value]="lastDigits()" (input)="lastDigits.set($any($event.target).value)"
        placeholder="Ej. 20230012300" maxlength="11" inputmode="numeric"
        class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm font-mono focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none" />
    </div>
  </div>

  <!-- Radicado construido preview -->
  <div class="bg-blue-50 border border-blue-100 rounded-lg px-4 py-2.5 flex items-center justify-between">
    <span class="text-xs font-semibold text-blue-700">Radicado construido:</span>
    <span class="font-mono text-sm font-bold text-blue-600">{{ builtRadicado() }}</span>
  </div>

  <!-- Footer -->
  <div class="pt-1 flex justify-between items-center border-t border-slate-100 mt-1">
    <button type="button" (click)="cancelled.emit()"
      class="px-4 py-2 font-semibold text-slate-600 hover:bg-slate-100 rounded-lg transition-colors text-sm">
      Cancelar
    </button>
    <button type="button" (click)="submit()"
      [disabled]="!canSubmit() || submitting()"
      class="px-5 py-2 bg-blue-600 hover:bg-blue-700 disabled:opacity-50 text-white font-semibold rounded-xl transition-colors text-sm shadow-sm">
      {{ submitting() ? 'Buscando…' : 'Buscar y Sincronizar' }}
    </button>
  </div>
</div>
