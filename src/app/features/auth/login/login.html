<div class="min-h-screen bg-slate-50 flex items-center justify-center p-4">
  <div class="w-full max-w-sm">
    <div class="flex items-center justify-center gap-2 mb-8 text-blue-700">
      <lucide-icon [img]="Scale" [size]="32" />
      <span class="text-2xl font-bold tracking-wide">LitigApp</span>
    </div>

    <form
      [formGroup]="form"
      (ngSubmit)="submit()"
      class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 space-y-4"
    >
      <div>
        <h1 class="text-lg font-bold text-slate-800">Iniciar sesión</h1>
        <p class="text-sm text-slate-500 mt-0.5">Acceso temporal (será reemplazado por 2.A).</p>
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Correo</label>
        <input
          type="email"
          formControlName="email"
          placeholder="abogado@test.co"
          class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none"
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Contraseña</label>
        <input
          type="password"
          formControlName="password"
          placeholder="••••••••"
          class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none"
        />
      </div>

      @if (error()) {
        <p class="text-sm text-red-600 bg-red-50 border border-red-200 rounded-lg px-3 py-2">
          {{ error() }}
        </p>
      }

      <button
        type="submit"
        [disabled]="loading()"
        class="w-full bg-blue-600 hover:bg-blue-700 disabled:opacity-60 text-white px-4 py-2.5 rounded-lg font-medium flex items-center justify-center gap-2 transition-colors"
      >
        <lucide-icon [img]="LogIn" [size]="18" />
        {{ loading() ? 'Ingresando…' : 'Ingresar' }}
      </button>
    </form>
  </div>
</div>
